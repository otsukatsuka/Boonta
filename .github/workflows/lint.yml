name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'cli.py'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'cli.py'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install pydantic pydantic-settings pandas numpy click httpx

      - name: Lint with ruff
        run: ruff check src/ config/ cli.py --output-format=github

      - name: Type check with mypy
        run: mypy src/ config/ cli.py --ignore-missing-imports
        continue-on-error: true
